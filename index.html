    <script>
        (function(){
            var t = localStorage.getItem('nx_theme');
            if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
            var ad = localStorage.getItem('nx_accent_dark');
            var al = localStorage.getItem('nx_accent_light');
            if (ad && al) {
                document.documentElement.style.setProperty('--primary', t === 'light' ? al : ad);
            } else {
                var a = localStorage.getItem('nx_accent');
                if (a) document.documentElement.style.setProperty('--primary', a);
            }
            var g = localStorage.getItem('nx_gradient');
            if (g) document.documentElement.style.setProperty('--primary-grad', g);
        })();
    </script>
