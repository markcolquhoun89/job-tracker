<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0d1117">
    <title>Job Tracker - Modern UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ui-lab.css">
</head>
<body>
    <div id="app-root">
        <!-- Top Header -->
        <header class="app-header">
            <div class="header-left">
                <button id="btn-menu" class="icon-btn" aria-label="Menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <h1 id="header-title">Jobs</h1>
            </div>
            <div class="header-actions">
                <button id="btn-search" class="icon-btn" aria-label="Search">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
                <button id="btn-add" class="primary-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Add
                </button>
            </div>
        </header>

        <!-- Date Navigation Bar -->
        <nav class="date-nav">
            <button id="btn-prev" class="nav-arrow">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15,18 9,12 15,6"></polyline>
                </svg>
            </button>
            <div class="date-display">
                <span id="date-label">Today</span>
                <div class="range-selector">
                    <button class="range-btn active" data-range="day">Day</button>
                    <button class="range-btn" data-range="week">Week</button>
                    <button class="range-btn" data-range="month">Month</button>
                    <button class="range-btn" data-range="year">Year</button>
                </div>
            </div>
            <button id="btn-next" class="nav-arrow">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9,18 15,12 9,6"></polyline>
                </svg>
            </button>
        </nav>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Jobs View -->
            <section id="jobs-view" class="view active">
                <!-- Stats Summary -->
                <div id="stats-summary" class="stats-summary">
                    <div class="stat-card">
                        <div class="stat-value" id="stat-jobs">0</div>
                        <div class="stat-label">Jobs</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-done">0</div>
                        <div class="stat-label">Done</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-pending">0</div>
                        <div class="stat-label">Pending</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-earned">£0</div>
                        <div class="stat-label">Earned</div>
                    </div>
                </div>

                <!-- Filters -->
                <div class="filters-bar">
                    <select id="status-filter">
                        <option value="all">All Status</option>
                        <option value="Pending">Pending</option>
                        <option value="Completed">Completed</option>
                        <option value="Internals">Internals</option>
                        <option value="Failed">Failed</option>
                    </select>
                    <input type="text" id="search-input" placeholder="Search jobs..." />
                    <button id="btn-batch" class="secondary-btn">Batch</button>
                </div>

                <!-- Jobs List -->
                <div id="jobs-list" class="jobs-list">
                    <div class="empty-state">No jobs found</div>
                </div>
            </section>

            <!-- Payweek View -->
            <section id="payweek-view" class="view">
                <div class="payweek-header">
                    <h2>Current Payweek</h2>
                    <div class="payweek-stats">
                        <div class="stat-large">
                            <div class="stat-value" id="payweek-total">£0.00</div>
                            <div class="stat-label">Total</div>
                        </div>
                        <div class="stat-large">
                            <div class="stat-value" id="payweek-jobs">0</div>
                            <div class="stat-label">Jobs</div>
                        </div>
                    </div>
                </div>
                <div id="payweek-list" class="jobs-list">
                    <div class="empty-state">No jobs in current payweek</div>
                </div>
            </section>

            <!-- History View -->
            <section id="history-view" class="view">
                <h2>Past Payweeks</h2>
                <div id="history-list" class="history-list">
                    <div class="empty-state">No history available</div>
                </div>
            </section>

            <!-- Settings View -->
            <section id="settings-view" class="view">
                <div class="settings-section">
                    <h3>Appearance</h3>
                    <div class="setting-item">
                        <span>Dark Mode</span>
                        <input type="checkbox" id="setting-theme" checked>
                    </div>
                    <div class="setting-item">
                        <span>Background Animation</span>
                        <select id="setting-bg-anim">
                            <option value="particles">Particles</option>
                            <option value="waves">Waves</option>
                            <option value="contour">Contour</option>
                            <option value="none">None</option>
                        </select>
                    </div>
                </div>

                <div class="settings-section">
                    <h3>Features</h3>
                    <div class="setting-item">
                        <span>Wake Lock</span>
                        <input type="checkbox" id="setting-wake-lock">
                    </div>
                    <div class="setting-item">
                        <span>Notifications</span>
                        <input type="checkbox" id="setting-notifications">
                    </div>
                </div>

                <div class="settings-section">
                    <h3>Data</h3>
                    <button id="btn-export" class="secondary-btn full-width">Export CSV</button>
                    <button id="btn-share-report" class="secondary-btn full-width">Share Report</button>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-view="jobs">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"></path>
                </svg>
                <span class="label">Jobs</span>
            </button>
            <button class="nav-item" data-view="payweek">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="1" x2="12" y2="23"></line>
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                </svg>
                <span class="label">Payweek</span>
            </button>
            <button class="nav-item" data-view="history">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <span class="label">History</span>
            </button>
            <button class="nav-item" data-view="settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                <span class="label">Settings</span>
            </button>
        </nav>

        <!-- Batch Mode Bar -->
        <div id="batch-bar" class="batch-bar hidden">
            <span id="batch-count">0 selected</span>
            <div class="batch-actions">
                <button class="batch-btn success" data-action="Completed">✓ Done</button>
                <button class="batch-btn warning" data-action="Internals">⚠ Int</button>
                <button class="batch-btn danger" data-action="Failed">✕ Fail</button>
                <button class="batch-btn" data-action="cancel">Cancel</button>
            </div>
        </div>

        <!-- Modals Container -->
        <div id="modal-container" class="hidden">
            <div class="modal-backdrop"></div>

            <!-- Add Job Modal -->
            <div id="add-job-modal" class="modal bottom-sheet hidden">
                <div class="sheet-drag-handle"></div>
                <h3>Add New Job</h3>
                <div class="modal-content">
                    <div class="form-group">
                        <label for="job-type">Job Type</label>
                        <select id="job-type">
                            <option value="">Select type...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="job-date">Date</label>
                        <input type="date" id="job-date">
                    </div>
                    <div class="form-group">
                        <label for="job-id">Job ID (optional)</label>
                        <input type="text" id="job-id" placeholder="Enter job ID">
                    </div>
                    <div class="modal-actions">
                        <button id="btn-cancel-add" class="secondary-btn">Cancel</button>
                        <button id="btn-save-add" class="primary-btn">Add Job</button>
                    </div>
                </div>
            </div>

            <!-- Edit Job Modal -->
            <div id="edit-job-modal" class="modal bottom-sheet hidden">
                <div class="sheet-drag-handle"></div>
                <h3>Edit Job</h3>
                <div class="modal-content">
                    <div class="form-group">
                        <label for="edit-job-type">Job Type</label>
                        <select id="edit-job-type"></select>
                    </div>
                    <div class="form-group">
                        <label for="edit-job-date">Date</label>
                        <input type="date" id="edit-job-date">
                    </div>
                    <div class="form-group">
                        <label for="edit-job-id">Job ID</label>
                        <input type="text" id="edit-job-id">
                    </div>
                    <div class="form-group">
                        <label for="edit-job-notes">Notes</label>
                        <textarea id="edit-job-notes" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="edit-job-fee">Custom Fee (optional)</label>
                        <input type="number" id="edit-job-fee" step="0.01">
                    </div>
                    <div class="modal-actions">
                        <button id="btn-delete-job" class="danger-btn">Delete</button>
                        <button id="btn-cancel-edit" class="secondary-btn">Cancel</button>
                        <button id="btn-save-edit" class="primary-btn">Save</button>
                    </div>
                </div>
            </div>

            <!-- Quick Status Modal -->
            <div id="quick-status-modal" class="modal bottom-sheet hidden">
                <div class="sheet-drag-handle"></div>
                <h3 id="quick-status-title">Update Status</h3>
                <div class="modal-content">
                    <div class="status-options">
                        <button class="status-option success" data-status="Completed">
                            <span class="icon">✅</span>
                            <span>Completed</span>
                        </button>
                        <button class="status-option warning" data-status="Internals">
                            <span class="icon">⚠️</span>
                            <span>Internals</span>
                        </button>
                        <button class="status-option danger" data-status="Failed">
                            <span class="icon">❌</span>
                            <span>Failed</span>
                        </button>
                        <button class="status-option" data-status="Pending">
                            <span class="icon">⏳</span>
                            <span>Pending</span>
                        </button>
                    </div>
                    <button id="btn-close-quick-status" class="secondary-btn full-width">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container"></div>

        <!-- Background Canvas for Animations -->
        <canvas id="bg-canvas"></canvas>
    </div>

    <script type="module" src="ui-lab.js"></script>
</body>
</html>
