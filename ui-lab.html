<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#121212">
    <title>Job Tracker - Modern UI</title>
    <!-- Core UI Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ui-lab.css">
</head>
<body>
    <div id="app-root">
        <!-- Persistent Top Header -->
        <header class="app-header">
            <h1 id="header-title">Queue</h1>
            <div class="header-actions">
                <button id="btn-search" aria-label="Search" class="icon-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
                <button id="btn-add" class="primary-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    New Job
                </button>
            </div>
        </header>

        <!-- Main Content Area (Scrollable) -->
        <main id="main-content">
            <!-- 1. Queue View -->
            <section id="view-queue" class="view active">
                <div class="list-filters">
                    <select id="filter-status">
                        <option value="all">All Jobs</option>
                        <option value="active">Active (Created/Saved/Docs)</option>
                        <option value="complete">Pending Payment (Done)</option>
                        <option value="paid">Paid</option>
                    </select>
                </div>
                <div id="queue-list" class="job-list">
                    <!-- Cards injected via JS -->
                    <div class="empty-state">Loading jobs...</div>
                </div>
            </section>
            
            <!-- 2. Payweek View -->
            <section id="view-payweek" class="view">
                <div class="stats-overview">
                    <div class="stat-card">
                        <h3>This Week</h3>
                        <div id="stat-week-total" class="stat-value">£0.00</div>
                    </div>
                    <div class="stat-card">
                        <h3>Jobs Done</h3>
                        <div id="stat-week-count" class="stat-value">0</div>
                    </div>
                </div>
                <h2 class="section-title">Current Payweek Jobs</h2>
                <div id="payweek-list" class="job-list">
                    <!-- Cards injected via JS -->
                </div>
            </section>
            
            <!-- 3. History View -->
            <section id="view-history" class="view">
                <h2 class="section-title">Past Payweeks</h2>
                <div id="history-list" class="history-list">
                    <div class="empty-state">No history available</div>
                </div>
            </section>
            
            <!-- 4. Settings View -->
            <section id="view-settings" class="view">
                <h2 class="section-title">Preferences</h2>
                <div class="settings-group">
                    <div class="setting-item">
                        <span>Dark Mode</span>
                        <input type="checkbox" id="setting-theme" checked>
                    </div>
                    <div class="setting-item">
                        <span>Compact Layout</span>
                        <input type="checkbox" id="setting-compact">
                    </div>
                </div>
                
                <h2 class="section-title" style="margin-top: 24px;">Cloud Sync</h2>
                <div class="settings-group">
                    <button id="btn-force-sync" class="secondary-btn">Force Sync</button>
                    <button id="btn-export" class="secondary-btn">Export Data</button>
                </div>
            </section>
        </main>

        <!-- Persistent Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-target="view-queue">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"></path></svg>
                <span class="label">Queue</span>
            </button>
            <button class="nav-item" data-target="view-payweek">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                <span class="label">Payweek</span>
            </button>
            <button class="nav-item" data-target="view-history">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span class="label">History</span>
            </button>
            <button class="nav-item" data-target="view-settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <span class="label">Settings</span>
            </button>
        </nav>
    </div>

    <!-- Modals Layer (Overlays Main App) -->
    <div id="modal-container" class="hidden">
        <div class="modal-backdrop"></div>
        <!-- Tap-to-expand Action Sheet -->
        <div id="job-action-sheet" class="bottom-sheet hidden">
            <div class="sheet-drag-handle"></div>
            <h3 id="sheet-job-title">Job Actions</h3>
            <div class="sheet-actions">
                <button class="sheet-btn" data-action="status-done">
                    <span class="icon">✅</span> Mark as Done
                </button>
                <button class="sheet-btn" data-action="status-paid">
                    <span class="icon">💳</span> Mark as Paid
                </button>
                <button class="sheet-btn" data-action="edit">
                    <span class="icon">✏️</span> Edit Details
                </button>
                <button class="sheet-btn danger" data-action="delete">
                    <span class="icon">🗑️</span> Delete Job
                </button>
            </div>
            <button class="sheet-cancel" id="btn-close-sheet">Cancel</button>
        </div>
    </div>

    <script type="module" src="ui-lab.js"></script>
</body>
</html>
