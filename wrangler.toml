name = "job-tracker"
type = "javascript"
account_id = ""

main = "index.html"
compatibility_date = "2024-01-01"

env = "production"

# Cloudflare Pages build and serve configuration
pages_build_output_dir = "."

# Environment variables
[env.production]
vars = { ENVIRONMENT = "production", DEBUG = "false" }

[env.development]
vars = { ENVIRONMENT = "development", DEBUG = "true" }

